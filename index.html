<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Bio: Ustaz AI</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .animate-scan { animation: scan 2s linear infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Иконкаларды көрсету функциясы
        const Icon = ({ name, size = 22, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Сәлеметсіз бе! Мен Ustaz AI көмекшісімін. Биология пәні бойынша қандай сұрағыңыз бар?' }
            ]);
            const [input, setInput] = useState('');
            const messagesEndRef = useRef(null);

            // СІЗДІҢ ОҚУЛЫҚТАР ТІЗІМІҢІЗ (Өзгеріссіз)
            const textbooks = [
                { grade: "7-сынып", books: [
                    { name: "Биология (Аймуханов Н.)", link: "https://okulyk.kz/biologija/1039/" },
                    { name: "Биология (Соловьева А.)", link: "https://okulyk.kz/biologija/245/" },
                    { name: "Биология (Очкур А.) 2025", link: "https://okulyk.com/7-klass/biologiya-7/7377/" }
                ]},
                { grade: "8-сынып", books: [
                    { name: "Биология (Короткова И.)", link: "https://okulyk.kz/biologija/1069/" },
                    { name: "Биология (Эрметов А.)", link: "https://okulyk.kz/biologija/325/" }
                ]},
                { grade: "9-сынып", books: [
                    { name: "Биология (Асанов Н.)", link: "https://okulyk.kz/biologija/402/" },
                    { name: "Биология (Оспанкулова Э.)", link: "https://okulyk.kz/biologija/1085/" },
                    { name: "Биология (Эрметов Б.) - Қос тілді", link: "https://okulyk.kz/biologija/422/", isBilingual: true }
                ]},
                { grade: "10-сынып", books: [
                    { name: "Биология (Асанов Н.)", link: "https://okulyk.kz/biologija/558/" },
                    { name: "Биология (Очкур А.) 1-Бөлім", link: "https://okulyk.com/10-klass/biologiya-10/3867/" },
                    { name: "Биология (Очкур А.) 2-Бөлім", link: "https://okulyk.com/10-klass/biologiya-10/3868/" }
                ]}
            ];

            // СІЗДІҢ ОЙЫНДАР ТІЗІМІҢІЗ (Өзгеріссіз)
            const gradeGames = [
                { grade: "7-сынып", categories: [{ title: "Өсімдіктер және Жасуша", items: [
                    { name: "Биология 7-сынып (Ойын)", link: "https://wordwall.net/ru/resource/52683273/7-сынып" },
                    { name: "Ботаника әлемі", link: "https://www.educaplay.com/learning-resources/16894463-7.html" },
                    { name: "Өсімдік мүшелері", link: "https://wordwall.net/ru/resource/31737782" }
                ]}]},
                { grade: "8-сынып", categories: [{ title: "Анатомия және Физиология", items: [
                    { name: "Есту мүшесі (Wordwall)", link: "https://wordwall.net/ru/resource/69120314/есту-мүшесі" },
                    { name: "Тіс құрылысы", link: "https://wordwall.net/ru/resource/99088901/тіс" },
                    { name: "Қан айналым жүйесі", link: "https://wordwall.net/ru/resource/35678234" }
                ]}]},
                { grade: "9-сынып", categories: [{ title: "Генетика және Жүйелер", items: [
                    { name: "Зәр шығару жүйесі", link: "https://wordwall.net/ru/resource/101689834" },
                    { name: "Митоз және Мейоз", link: "https://wordwall.net/ru/resource/106059535" },
                    { name: "Генетикалық есептер", link: "https://wordwall.net/ru/resource/29837462" }
                ]}]},
                { grade: "10-сынып", categories: [{ title: "Молекулалық биология", items: [
                    { name: "ДНҚ құрылымы", link: "https://wordwall.net/ru/resource/33456712" },
                    { name: "Биологиялық диктант", link: "https://wordwall.net/ru/resource/33892011" }
                ]}]}
            ];

            const handleSendMessage = () => {
                if (!input.trim()) return;
                setMessages([...messages, { role: 'user', text: input }, { role: 'bot', text: 'Жауап дайындалуда... API кілтін тексеріңіз.' }]);
                setInput('');
            };

            return (
                <div className={`flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-gray-50 text-gray-800'}`}>
                    <main className="flex-1 overflow-y-auto p-4 pb-24 no-scrollbar">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h1 className="text-2xl font-bold">Қайырлы күн!</h1>
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full bg-white dark:bg-slate-800 shadow">
                                        <Icon name={isDarkMode ? "sun" : "moon"} />
                                    </button>
                                </div>
                                <div onClick={() => setActiveTab('scanner')} className="w-full bg-gradient-to-r from-emerald-500 to-teal-600 p-10 rounded-3xl shadow-lg flex flex-col items-center cursor-pointer active:scale-95 transition-all">
                                    <Icon name="qr-code" size={56} className="text-white mb-2" />
                                    <span className="text-white font-bold text-xl">QR-код Сканер</span>
                                </div>
                                <div onClick={() => setActiveTab('ai')} className="p-6 rounded-[32px] bg-gradient-to-br from-indigo-500 to-purple-500 text-white shadow-xl flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                                    <div className="flex items-center space-x-4">
                                        <Icon name="sparkles" size={28} />
                                        <div><h3 className="font-bold text-lg">Ustaz AI</h3><p className="opacity-80 text-xs">Интеллектуалды көмекші</p></div>
                                    </div>
                                    <Icon name="chevron-right" />
                                </div>
                                <div className="p-5 bg-white dark:bg-slate-800 rounded-3xl border border-gray-100 dark:border-slate-700 flex items-center space-x-4">
                                    <div className="p-3 bg-indigo-500 text-white rounded-2xl"><Icon name="file-text" /></div>
                                    <div><h4 className="font-bold">Ресурс таңдау</h4><p className="text-xs text-gray-400">Төменгі мәзірді қолданыңыз</p></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'book' && (
                            <div className="space-y-6">
                                <h1 className="text-2xl font-bold">Сандық оқулық</h1>
                                {textbooks.map((grade, idx) => (
                                    <div key={idx} className="space-y-2">
                                        <div className="text-[11px] font-black uppercase tracking-tighter px-2 py-1 bg-gray-100 dark:bg-slate-800 inline-block rounded">{grade.grade}</div>
                                        <div className="grid gap-2">
                                            {grade.books.map((book, bIdx) => (
                                                <a key={bIdx} href={book.link} target="_blank" className="p-4 bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700 flex justify-between items-center transition-all active:scale-95">
                                                    <div className="flex items-center space-x-3">
                                                        <Icon name={book.isBilingual ? "languages" : "book-open"} className="text-blue-500" />
                                                        <span className="text-sm font-bold">{book.name}</span>
                                                    </div>
                                                    <Icon name="chevron-right" size={16} className="text-gray-300" />
                                                </a>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'ai' && (
                            <div className="flex flex-col h-full">
                                <div className="flex-1 space-y-4 overflow-y-auto no-scrollbar mb-4">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-4 rounded-3xl max-w-[85%] text-sm ${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-200 dark:bg-slate-800'}`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex space-x-2 bg-white dark:bg-slate-800 p-2 rounded-2xl border border-gray-200 dark:border-slate-700">
                                    <input value={input} onChange={e => setInput(e.target.value)} className="flex-1 bg-transparent px-3 outline-none" placeholder="Жазу..." />
                                    <button onClick={handleSendMessage} className="p-2 bg-indigo-600 text-white rounded-xl"><Icon name="send" size={18}/></button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'games' && (
                            <div className="space-y-6">
                                <h1 className="text-2xl font-bold">Ойындар</h1>
                                {gradeGames.map((grade, idx) => (
                                    <div key={idx} className="space-y-3">
                                        <div className="px-4 py-1 bg-emerald-600 text-white rounded-full text-xs font-bold inline-block">{grade.grade}</div>
                                        {grade.categories.map((cat, cIdx) => (
                                            <div key={cIdx} className="space-y-2">
                                                <h3 className="text-[10px] uppercase font-bold text-gray-400 px-1">{cat.title}</h3>
                                                {cat.items.map((game, iIdx) => (
                                                    <a key={iIdx} href={game.link} target="_blank" className="p-4 bg-white dark:bg-slate-800 rounded-2xl border border-gray-100 dark:border-slate-700 flex justify-between items-center active:scale-95 transition-all">
                                                        <div className="flex items-center space-x-3"><Icon name="gamepad-2" className="text-indigo-500" /><span className="text-sm font-medium">{game.name}</span></div>
                                                        <Icon name="external-link" size={16} className="text-gray-400" />
                                                    </a>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'scanner' && (
                            <div className="h-full bg-slate-900 rounded-3xl flex flex-col items-center justify-center space-y-6">
                                <div className="w-64 h-64 border-4 border-emerald-500 rounded-[40px] relative overflow-hidden flex items-center justify-center">
                                    <div className="absolute top-0 w-full h-1 bg-emerald-400 animate-scan"></div>
                                    <Icon name="qr-code" size={100} className="text-white/20" />
                                </div>
                                <button onClick={() => setActiveTab('home')} className="px-6 py-2 bg-white/10 text-white rounded-xl">Артқа</button>
                            </div>
                        )}
                    </main>

                    <nav className={`fixed bottom-0 max-w-md w-full border-t flex justify-around items-center py-4 px-2 z-50 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-200'}`}>
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center flex-1 ${activeTab === 'home' ? 'text-emerald-600' : 'text-gray-400'}`}><Icon name="home" /><span className="text-[9px] font-bold uppercase">Басты</span></button>
                        <button onClick={() => setActiveTab('book')} className={`flex flex-col items-center flex-1 ${activeTab === 'book' ? 'text-emerald-600' : 'text-gray-400'}`}><Icon name="book-open" /><span className="text-[9px] font-bold uppercase">Оқулық</span></button>
                        <button onClick={() => setActiveTab('ai')} className={`flex flex-col items-center flex-1 ${activeTab === 'ai' ? 'text-emerald-600' : 'text-gray-400'}`}><Icon name="message-square" /><span className="text-[9px] font-bold uppercase">Ustaz AI</span></button>
                        <button onClick={() => setActiveTab('games')} className={`flex flex-col items-center flex-1 ${activeTab === 'games' ? 'text-emerald-600' : 'text-gray-400'}`}><Icon name="gamepad-2" /><span className="text-[9px] font-bold uppercase">Ойындар</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
