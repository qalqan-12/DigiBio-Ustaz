                Bot: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>,

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isOfflineMode, setIsOfflineMode] = useState(false);
            const [showInstallPrompt, setShowInstallPrompt] = useState(false);
            
            // AI күйі
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Сәлеметсіз бе! Мен Ustaz AI көмекшісімін. Биология пәні бойынша қандай сұрағыңыз бар?' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            // Пайдаланушыға экранға қосу туралы ескертуді көрсету
            useEffect(() => {
                const isInstalled = localStorage.getItem('pwaPromptDismissed');
                if (!isInstalled) {
                    const timer = setTimeout(() => setShowInstallPrompt(true), 3000);
                    return () => clearTimeout(timer);
                }
            }, []);

            const dismissPrompt = () => {
                setShowInstallPrompt(false);
                localStorage.setItem('pwaPromptDismissed', 'true');
            };

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // Платформа мәліметтері (Кітаптар)
            const textbooks = [
                {
                    grade: "7-сынып",
                    books: [
                        { name: "Биология (Аймуханов Н.)", link: "https://okulyk.kz/biologija/1039/", publisher: "okulyk.kz" },
                        { name: "Биология (Соловьева А.)", link: "https://okulyk.kz/biologija/245/", publisher: "okulyk.kz" },
                        { name: "Биология (Очкур А.) 2025", link: "https://okulyk.com/7-klass/biologiya-7/7377/", publisher: "okulyk.com" }
                    ]
                },
                {
                    grade: "8-сынып",
                    books: [
                        { name: "Биология (Короткова И.)", link: "https://okulyk.kz/biologija/1069/", publisher: "okulyk.kz" },
                        { name: "Биология (Эрметов А.)", link: "https://okulyk.kz/biologija/325/", publisher: "okulyk.kz" }
                    ]
                },
                {
                    grade: "9-сынып",
                    books: [
                        { name: "Биология (Асанов Н.)", link: "https://okulyk.kz/biologija/402/", publisher: "okulyk.kz" },
                        { name: "Биология (Оспанкулова Э.)", link: "https://okulyk.kz/biologija/1085/", publisher: "okulyk.kz" },
                        { name: "Биология (Эрметов Б.) - Қос тілді", link: "https://okulyk.kz/biologija/422/", publisher: "okulyk.kz", isBilingual: true }
                    ]
                },
                {
                    grade: "10-сынып",
                    books: [
                        { name: "Биология (Асанов Н.)", link: "https://okulyk.kz/biologija/558/", publisher: "okulyk.kz" },
                        { name: "Биология (Очкур А.) 1-Бөлім", link: "https://okulyk.com/10-klass/biologiya-10/3867/", publisher: "okulyk.com" },
                        { name: "Биология (Очкур А.) 2-Бөлім", link: "https://okulyk.com/10-klass/biologiya-10/3868/", publisher: "okulyk.com" }
                    ]
                }
            ];

            // Платформа мәліметтері (Ойындар)
            const gradeGames = [
                { 
                    grade: "7-сынып", 
                    categories: [
                        {
                            title: "Өсімдіктер және Жасуша",
                            items: [
                                { name: "Биология 7-сынып (Ойын)", link: "https://wordwall.net/ru/resource/52683273/7-сынып" },
                                { name: "Ботаника әлемі", link: "https://www.educaplay.com/learning-resources/16894463-7.html" },
                                { name: "Өсімдік мүшелері", link: "https://wordwall.net/ru/resource/31737782" }
                            ]
                        }
                    ]
                },
                { 
                    grade: "8-сынып", 
                    categories: [
                        {
                            title: "Анатомия және Физиология",
                            items: [
                                { name: "Есту мүшесі (Wordwall)", link: "https://wordwall.net/ru/resource/69120314/есту-мүшесі" },
                                { name: "Тіс құрылысы", link: "https://wordwall.net/ru/resource/99088901/тіс" },
                                { name: "Қан айналым жүйесі", link: "https://wordwall.net/ru/resource/35678234" }
                            ]

                },

                    grade: "9-сынып", 
                    categories: [
                        {
                            title: "Генетика және Жүйелер",
                            items: [
                                { name: "Зәр шығару жүйесі", link: "https://wordwall.net/ru/resource/101689834" },
                                { name: "Митоз және Мейоз", link: "https://wordwall.net/ru/resource/106059535" },
                                { name: "Генетикалық есептер", link: "https://wordwall.net/ru/resource/29837462" }
                            ]
                        }
                    ]
                },
                { 
                    grade: "10-сынып", 
                    categories: [
                        {
                            title: "Молекулалық биология",
                            items: [
                                { name: "ДНҚ құрылымы", link: "https://wordwall.net/ru/resource/33456712" },
                                { name: "Биологиялық диктант", link: "https://wordwall.net/ru/resource/33892011" }
                            ]
                        }
                    ]
                }
            ];

            // Сіз берген жаңа handleSendMessage функциясы
            const handleSendMessage = () => {
                if (input.trim() === '') return;

                // Сұрақты экранға шығару
                const userMsg = { role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                
                const currentInput = input.toLowerCase();
                setInput('');
                setIsLoading(true);

                // Боттың "ойланып" жатқанын көрсету (имитация)
                setTimeout(() => {
                    let responseText = "";

                    // Сұраққа қарай жауап таңдау (Логика)
                    if (currentInput.includes("сәлем") || currentInput.includes("привет")) {
                        responseText = "Сәлеметсіз бе! Мен DigiBio-ның Ustaz AI көмекшісімін. Биология пәні бойынша қандай сұрағыңыз бар?";

                    } else if (currentInput.includes("Фотосинтез")) {
                        responseText = "Фотосинтез — өсімдіктердің күн сәулесі арқылы органикалық заттарды түзу процесі. Бұл процесс хлоропластарда жүреді.";

                        responseText = "Өте қызықты сұрақ! DigiBio платформасының бұл бөлімі қазір тест режимінде жұмыс істеп тұр. Толық жауапты біздің 'Сандық оқулықтар' қорынан таба аласыз.";
                    }

                    const botResponse = { role: 'bot', text: responseText };
                    setMessages(prev => [...prev, botResponse]);
                    setIsLoading(false);
                }, 800); // 0.8 секундтық кідіріс нақтылық береді
            };

            const renderContent = () => {
                switch (activeTab) {
                    case 'home':
                        return (
                            <div className="p-4 space-y-6 animate-in fade-in duration-500 pb-24">

                                    <div className="flex items-center space-x-3">
                                        <div className="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600">
                                            <Icon name="User" size={24} />
                                        </div>
                                        <div>
                                            <h1 className="text-2xl font-bold text-gray-800">Қайырлы күн!</h1>
                                            <p className="text-sm text-gray-500 font-medium">Қош келдіңіз</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setActiveTab('settings')}
                                        className="p-2 rounded-full shadow-sm transition-all active:scale-90 bg-white text-gray-600"
                                    >
                                        <Icon name="Settings" size={24} />
                                    </button>
                                </div>

                                {showInstallPrompt && (
                                    <div className="bg-emerald-600 p-4 rounded-3xl text-white relative animate-in slide-in-from-top duration-700">
                                        <button onClick={dismissPrompt} className="absolute top-3 right-3 opacity-70"><Icon name="X" size={18}/></button>
                                        <div className="flex items-start space-x-3 pr-6">
                                           <div className="bg-white/20 p-2 rounded-xl"><Icon name="PlusSquare" size={20}/></div>
                                           <div>
                                             <p className="font-bold text-sm">Экранға қосып алыңыз</p>
                                             <p className="text-xs text-white/80 mt-1">Платформаны жылдам ашу үшін браузер мәзірінен "Басты экранға қосу" батырмасын басыңыз.</p>
                                           </div>
                                        </div>
                                    </div>
                                )}

                                <button 
                                    onClick={() => setActiveTab('scanner')}
                                    className="w-full bg-gradient-to-r from-emerald-500 to-teal-600 p-10 rounded-3xl shadow-lg flex flex-col items-center justify-center space-y-4 active:scale-95 transition-transform"
                                >
                                    <div className="p-4 bg-white/20 rounded-2xl">
                                        <Icon name="QrCode" size={56} className="text-white" />
                                    </div>
                                    <div className="text-center">
                                        <span className="text-white font-bold text-2xl block">QR-код Сканер</span>
                                        <p className="text-white/80 text-sm mt-1">Оқулық материалдарын ашу</p>
                                    </div>
                                </button>

                                <div 
                                    onClick={() => setActiveTab('ai')}
                                    className="p-6 rounded-[32px] cursor-pointer bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white shadow-xl flex items-center justify-between group active:scale-[0.98] transition-all"
                                >
                                    <div className="flex items-center space-x-4">
                                        <div className="p-3 bg-white/20 rounded-2xl">
                                            <Icon name="Sparkles" size={28} />
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg">Ustaz AI</h3>
                                            <p className="text-white/80 text-xs">Интеллектуалды көмекші</p>
                                        </div>
                                    </div>
                                    <Icon name="ChevronRight" size={24} className="group-hover:translate-x-1 transition-transform" />
                                </div>
                            </div>
                        );

                    case 'book':
                        return (
                            <div className="p-4 space-y-8 animate-in slide-in-from-bottom duration-500 pb-24">
                                <h1 className="text-2xl font-bold text-gray-800">Сандық оқулық</h1>
                                <div className="space-y-8">
                                    {textbooks.map((gradeInfo, idx) => (
                                        <div key={idx} className="space-y-3">
                                            <div className="text-[11px] font-black uppercase tracking-tighter px-2 py-1 inline-block rounded bg-gray-100 text-gray-500">
                                                {gradeInfo.grade}
                                            </div>
                                            <div className="grid grid-cols-1 gap-2">
                                                {gradeInfo.books.map((book, bIdx) => (
                                                    <a key={bIdx} href={book.link} target="_blank" rel="noopener noreferrer" className="bg-white border-gray-100 hover:bg-gray-50 p-4 rounded-2xl border shadow-sm flex items-center justify-between group active:scale-[0.98] transition-all">
                                                        <div className="flex items-center space-x-3">
                                                            <div className={`p-2 rounded-xl bg-blue-50 ${book.isBilingual ? 'text-purple-600' : 'text-blue-600'}`}>
                                                                <Icon name={book.isBilingual ? "Languages" : "BookOpen"} size={20} />
                                                            </div>
                                                            <div>
                                                                <h4 className="text-sm font-bold text-gray-800">{book.name}</h4>
                                                            </div>
                                                        </div>
                                                        <Icon name="ChevronRight" size={16} className="text-gray-300 group-hover:text-blue-500 transition-colors" />
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="pt-6 border-t border-gray-200">
                                    <a href="https://drive.google.com/drive/folders/1E7SJwXhkClQikRqihFZG2cNElZzicADw?usp=sharing" target="_blank" className="bg-white border-gray-100 shadow-emerald-100/50 shadow-md p-6 rounded-3xl border flex items-center justify-between group active:scale-95 transition-all">
                                        <div className="flex items-center space-x-4">
                                            <div className="p-3 bg-emerald-500 text-white rounded-2xl">
                                                <Icon name="FolderOpen" size={24} />
                                            </div>
                                            <div><h4 className="font-bold text-gray-800">ҚМЖ жинағы</h4></div>
                                        </div>
                                        <Icon name="ExternalLink" size={20} className="text-emerald-500" />
                                    </a>
                                </div>
                            </div>
                        );

                    case 'ai':
                        return (
                            <div className="flex flex-col h-full animate-in slide-in-from-right duration-300 pb-24">
                                <div className="p-4 border-b flex items-center justify-between bg-white border-gray-100">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white">
                                            <Icon name="Bot" size={24} />
                                        </div>
                                        <h2 className="font-bold text-gray-800">Ustaz AI</h2>
                                    </div>
                                    <button onClick={() => setMessages([{ role: 'bot', text: 'Сұрағыңыз бар ма?' }])} className="text-gray-400"><Icon name="RefreshCw" size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                                    {messages.map((msg, index) => (
                                        <div key={index} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-3xl text-sm ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-gray-100 text-gray-800 rounded-bl-none'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isLoading && (
                                        <div className="flex justify-start">
                                            <div className="bg-gray-100 text-gray-400 p-3 rounded-2xl text-xs animate-pulse">Ойлануда...</div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                                <div className="p-4">
                                    <div className="flex items-center p-2 rounded-2xl border bg-gray-50 border-gray-200">
                                        <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()} placeholder="Жазу..." className="flex-1 bg-transparent px-3 outline-none text-gray-500 text-sm"/>
                                        <button onClick={handleSendMessage} className="p-2 bg-indigo-600 text-white rounded-xl"><Icon name="Send" size={18}/></button>
                                    </div>
                                </div>
                            </div>
                        );

                    case 'games':
                        return (
                            <div className="p-4 space-y-6 animate-in slide-in-from-bottom duration-500 pb-24">
                                <h1 className="text-2xl font-bold text-gray-800">Ойындар</h1>
                                {gradeGames.map((gradeData, gIndex) => (
                                    <div key={gIndex} className="space-y-4">
                                        <div className="px-4 py-1 bg-emerald-600 text-white rounded-full text-xs font-bold inline-block shadow-md">{gradeData.grade}</div>
                                        {gradeData.categories.map((cat, cIndex) => (
                                            <div key={cIndex} className="space-y-2">
                                                <h3 className="text-[10px] uppercase font-bold text-gray-400 px-1">{cat.title}</h3>
                                                <div className="grid grid-cols-1 gap-2">
                                                    {cat.items.map((game, iIndex) => (
                                                        <a key={iIndex} href={game.link} target="_blank" className="bg-white border-gray-100 p-4 rounded-2xl border shadow-sm flex items-center justify-between group transition-all">
                                                            <div className="flex items-center space-x-3">
                                                                <div className="p-2 bg-indigo-500/10 text-indigo-500 rounded-xl"><Icon name="Gamepad2" size={20} /></div>
                                                                <span className="text-sm font-medium text-gray-800">{game.name}</span>
                                                            </div>
                                                            <Icon name="ExternalLink" size={16} className="text-gray-400 group-hover:text-indigo-500" />
                                                        </a>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        );

                    case 'settings':
                        return (
                            <div className="p-4 space-y-6 animate-in fade-in">
                                <div className="flex items-center space-x-4">
                                    <button onClick={() => setActiveTab('home')} className="p-2 bg-gray-100 rounded-xl"><Icon name="ChevronRight" className="rotate-180" size={20}/></button>
                                    <h1 className="text-2xl font-bold text-gray-800">Баптаулар</h1>
                                </div>
                                <div className="bg-white border-gray-100 p-6 rounded-3xl border shadow-sm space-y-6">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center space-x-3">
                                            <div className="p-2 bg-orange-100 text-orange-600 rounded-xl"><Icon name="WifiOff" size={20}/></div>
                                            <span className="font-medium text-gray-700">Офлайн режим</span>
                                        </div>
                                        <div className={`w-12 h-6 rounded-full relative cursor-pointer transition-colors ${isOfflineMode ? 'bg-emerald-500' : 'bg-gray-300'}`} onClick={() => setIsOfflineMode(!isOfflineMode)}>
                                            <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${isOfflineMode ? 'right-1' : 'left-1'}`}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );

                    case 'scanner':
                        return (
                            <div className="h-full bg-slate-900 flex flex-col items-center justify-center space-y-6">
                                <div className="w-64 h-64 border-4 border-emerald-500 rounded-[40px] flex items-center justify-center relative overflow-hidden">
                                   <div className="absolute top-0 w-full h-1 bg-emerald-400 animate-scan"></div>
                                   <Icon name="QrCode" size={100} className="text-white/20" />
                                </div>
                                <button onClick={() => setActiveTab('home')} className="px-6 py-2 bg-white/10 text-white rounded-xl">Артқа</button>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto shadow-2xl overflow-hidden bg-gray-50 font-sans">
                    <main className="flex-1 overflow-y-auto no-scrollbar">
                        {renderContent()}
                    </main>

                    <nav className="fixed bottom-0 max-w-md w-full border-t flex justify-around items-center py-4 px-2 z-50 bg-white border-gray-200">
                        {[
                            { id: 'home', icon: 'Home', label: 'Басты' },
                            { id: 'book', icon: 'BookOpen', label: 'Оқулық' },
                            { id: 'ai', icon: 'MessageSquare', label: 'Ustaz AI' },
                            { id: 'games', icon: 'Gamepad2', label: 'Ойындар' }
                        ].map((tab) => (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)} 
                                className={`flex flex-col items-center space-y-1 flex-1 transition-all ${activeTab === tab.id ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}
                            >
                                <Icon name={tab.icon} size={22} />
                                <span className="text-[9px] font-bold uppercase">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    <style dangerouslySetInnerHTML={{ __html: `
                        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
                        .animate-scan { animation: scan 2s linear infinite; }
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                        body { -webkit-tap-highlight-color: transparent; user-select: none; }
                        input { user-select: text; }
                    `}} />
                </div>
            );
        };

        // Render call
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
